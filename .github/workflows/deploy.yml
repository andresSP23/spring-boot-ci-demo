name: CI/CD Spring Boot Docker

on:
  push:
    branches: ["main"]

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Give permission to mvnw
        run: chmod +x mvnw

      - name: Build application
        run: ./mvnw clean package -DskipTests

      - name: Generate Docker tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:${{ env.IMAGE_TAG }} \
          .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:${{ env.IMAGE_TAG }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop spring-demo || true
            docker rm spring-demo || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
            docker run -d \
              --name spring-demo \
              -p 8081:8081 \
              ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest